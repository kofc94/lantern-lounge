name: OpenTofu Plan

on:
  pull_request:
    paths:
      - "infrastructure/**"

jobs:
  # ── infrastructure/aws ──────────────────────────────────────────────────────
  plan-aws:
    name: Plan / aws
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^infrastructure/aws/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: opentofu/setup-opentofu@v1
        if: steps.changes.outputs.changed == 'true'

      - name: Tofu Init
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/aws
        run: tofu init -input=false

      - name: Tofu Plan
        id: plan
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/aws
        continue-on-error: true
        run: tofu plan -input=false -no-color 2>&1 | tee plan_output.txt; exit ${PIPESTATUS[0]}

      - name: Post plan comment
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('infrastructure/aws/plan_output.txt', 'utf8');
            const output = raw.length > 60000 ? raw.slice(-60000) + '\n...(truncated)' : raw;
            const success = '${{ steps.plan.outcome }}' === 'success';
            const icon = success ? '✅' : '❌';
            const body = [
              `### ${icon} OpenTofu Plan — \`infrastructure/aws\``,
              '',
              '<details><summary>Show output</summary>',
              '',
              '```',
              output,
              '```',
              '',
              '</details>',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan failed
        if: steps.changes.outputs.changed == 'true' && steps.plan.outcome == 'failure'
        run: exit 1

  # ── infrastructure/authentication ───────────────────────────────────────────
  plan-authentication:
