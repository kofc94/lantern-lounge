name: OpenTofu Plan

on:
  pull_request:
    paths:
      - "infrastructure/**"
      - "app/**"

jobs:
  detect-changes:
    name: Detect Changed Projects
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.set-projects.outputs.projects }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed projects
        id: set-projects
        run: |
          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          
          # Identify directories in app/ and infrastructure/ that have a Makefile
          PROJECTS=$(echo "$CHANGED_FILES" | grep -E '^(app/|infrastructure/)' | cut -d/ -f1,2 | sort -u)
          
          # Filter for directories that actually have a Makefile
          VALID_PROJECTS=()
          for project in $PROJECTS; do
            if [ -f "$project/Makefile" ]; then
              VALID_PROJECTS+=("\"$project\"")
            fi
          done
          
          # Join into a JSON array for matrix
          JSON_PROJECTS="[$(IFS=,; echo "${VALID_PROJECTS[*]}")]"
          echo "projects=$JSON_PROJECTS" >> $GITHUB_OUTPUT
          echo "Detected projects: $JSON_PROJECTS"

  plan:
    name: Plan / ${{ matrix.project }}
    needs: detect-changes
    if: needs.detect-changes.outputs.projects != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.projects) }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Google Credentials
        if: startsWith(matrix.project, 'infrastructure/gcp') || matrix.project == 'app/cognito'
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/google-credentials.json

      - uses: opentofu/setup-opentofu@v1

      - name: Build and Test
        id: test
        working-directory: ${{ matrix.project }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/google-credentials.json
          GITHUB_TOKEN: ${{ secrets.GH_TOFU_TOKEN }}
        run: |
          make build
          make test -B -o -no-color 2>&1 | tee plan_output.txt; exit ${PIPESTATUS[0]}

      - name: Post plan comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const project = '${{ matrix.project }}';
            const planFile = `${project}/plan_output.txt`;
            if (fs.existsSync(planFile)) {
              const raw = fs.readFileSync(planFile, 'utf8');
              const output = raw.length > 60000 ? raw.slice(-60000) + '\n...(truncated)' : raw;
              const success = '${{ steps.test.outcome }}' === 'success';
              const icon = success ? '✅' : '❌';
              const body = [
                `### ${icon} OpenTofu Plan — \`${project}\``,
                '',
                '<details><summary>Show output</summary>',
                '',
                '```',
                output,
                '```',
                '',
                '</details>',
              ].join('\n');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
