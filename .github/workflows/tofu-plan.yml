name: OpenTofu Plan

on:
  pull_request:
    paths:
      - "infrastructure/**"

jobs:
  # ── infrastructure/aws ──────────────────────────────────────────────────────
  plan-aws:
    name: Plan / aws
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^infrastructure/aws/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.changes.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: opentofu/setup-opentofu@v1
        if: steps.changes.outputs.changed == 'true'

      - name: Tofu Init
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/aws
        run: tofu init -input=false

      - name: Tofu Plan
        id: plan
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/aws
        continue-on-error: true
        run: tofu plan -input=false -no-color 2>&1 | tee plan_output.txt; exit ${PIPESTATUS[0]}

      - name: Post plan comment
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('infrastructure/aws/plan_output.txt', 'utf8');
            const output = raw.length > 60000 ? raw.slice(-60000) + '\n...(truncated)' : raw;
            const success = '${{ steps.plan.outcome }}' === 'success';
            const icon = success ? '✅' : '❌';
            const body = [
              `### ${icon} OpenTofu Plan — \`infrastructure/aws\``,
              '',
              '<details><summary>Show output</summary>',
              '',
              '```',
              output,
              '```',
              '',
              '</details>',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan failed
        if: steps.changes.outputs.changed == 'true' && steps.plan.outcome == 'failure'
        run: exit 1

  # ── infrastructure/app ──────────────────────────────────────────────────────
  plan-app:
    name: Plan / app
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^infrastructure/app/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.changes.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: opentofu/setup-opentofu@v1
        if: steps.changes.outputs.changed == 'true'

      - name: Tofu Init
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/app
        run: tofu init -input=false

      - name: Tofu Plan
        id: plan
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/app
        continue-on-error: true
        run: tofu plan -input=false -no-color 2>&1 | tee plan_output.txt; exit ${PIPESTATUS[0]}

      - name: Post plan comment
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('infrastructure/app/plan_output.txt', 'utf8');
            const output = raw.length > 60000 ? raw.slice(-60000) + '\n...(truncated)' : raw;
            const success = '${{ steps.plan.outcome }}' === 'success';
            const icon = success ? '✅' : '❌';
            const body = [
              `### ${icon} OpenTofu Plan — \`infrastructure/app\``,
              '',
              '<details><summary>Show output</summary>',
              '',
              '```',
              output,
              '```',
              '',
              '</details>',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan failed
        if: steps.changes.outputs.changed == 'true' && steps.plan.outcome == 'failure'
        run: exit 1

  # ── infrastructure/google ───────────────────────────────────────────────────
  plan-google:
    name: Plan / google
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^infrastructure/google/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.changes.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Configure Google credentials
        if: steps.changes.outputs.changed == 'true'
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/google-credentials.json

      - uses: opentofu/setup-opentofu@v1
        if: steps.changes.outputs.changed == 'true'

      - name: Tofu Init
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/google
        run: tofu init -input=false
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/google-credentials.json

      - name: Tofu Plan
        id: plan
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/google
        continue-on-error: true
        run: tofu plan -input=false -no-color 2>&1 | tee plan_output.txt; exit ${PIPESTATUS[0]}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/google-credentials.json

      - name: Post plan comment
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('infrastructure/google/plan_output.txt', 'utf8');
            const output = raw.length > 60000 ? raw.slice(-60000) + '\n...(truncated)' : raw;
            const success = '${{ steps.plan.outcome }}' === 'success';
            const icon = success ? '✅' : '❌';
            const body = [
              `### ${icon} OpenTofu Plan — \`infrastructure/google\``,
              '',
              '<details><summary>Show output</summary>',
              '',
              '```',
              output,
              '```',
              '',
              '</details>',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan failed
        if: steps.changes.outputs.changed == 'true' && steps.plan.outcome == 'failure'
        run: exit 1

  # ── infrastructure/github ───────────────────────────────────────────────────
  plan-github:
    name: Plan / github
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^infrastructure/github/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: opentofu/setup-opentofu@v1
        if: steps.changes.outputs.changed == 'true'

      - name: Tofu Init
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/github
        run: tofu init -input=false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOFU_TOKEN }}

      - name: Tofu Plan
        id: plan
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/github
        continue-on-error: true
        run: tofu plan -input=false -no-color 2>&1 | tee plan_output.txt; exit ${PIPESTATUS[0]}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOFU_TOKEN }}

      - name: Post plan comment
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('infrastructure/github/plan_output.txt', 'utf8');
            const output = raw.length > 60000 ? raw.slice(-60000) + '\n...(truncated)' : raw;
            const success = '${{ steps.plan.outcome }}' === 'success';
            const icon = success ? '✅' : '❌';
            const body = [
              `### ${icon} OpenTofu Plan — \`infrastructure/github\``,
              '',
              '<details><summary>Show output</summary>',
              '',
              '```',
              output,
              '```',
              '',
              '</details>',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan failed
        if: steps.changes.outputs.changed == 'true' && steps.plan.outcome == 'failure'
        run: exit 1
