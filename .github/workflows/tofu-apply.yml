name: OpenTofu Apply

on:
  push:
    branches:
      - main
    paths:
      - "infrastructure/**"

jobs:
  # ── infrastructure/aws ──────────────────────────────────────────────────────
  apply-aws:
    name: Apply / aws
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^infrastructure/aws/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.changes.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: opentofu/setup-opentofu@v1
        if: steps.changes.outputs.changed == 'true'

      - name: Tofu Init
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/aws
        run: tofu init -input=false

      - name: Tofu Apply
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/aws
        run: tofu apply -input=false -auto-approve

  # ── infrastructure/authentication ───────────────────────────────────────────
  apply-authentication:
    name: Apply / authentication
    runs-on: ubuntu-latest
    needs: apply-aws
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^infrastructure/authentication/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.changes.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Configure Google credentials
        if: steps.changes.outputs.changed == 'true'
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/google-credentials.json

      - uses: opentofu/setup-opentofu@v1
        if: steps.changes.outputs.changed == 'true'

      - name: Tofu Init
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/authentication
        run: tofu init -input=false
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/google-credentials.json

      - name: Tofu Apply
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/authentication
        run: tofu apply -input=false -auto-approve
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/google-credentials.json

  # ── infrastructure/github ───────────────────────────────────────────────────
  apply-github:
    name: Apply / github
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^infrastructure/github/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: opentofu/setup-opentofu@v1
        if: steps.changes.outputs.changed == 'true'

      - name: Tofu Init
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/github
        run: tofu init -input=false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOFU_TOKEN }}

      - name: Tofu Apply
        if: steps.changes.outputs.changed == 'true'
        working-directory: infrastructure/github
        run: tofu apply -input=false -auto-approve
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOFU_TOKEN }}
