name: OpenTofu Apply

on:
  push:
    branches:
      - main
    paths:
      - "infrastructure/**"
      - "app/**"

jobs:
  detect-changes:
    name: Detect Changed Projects
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.set-projects.outputs.projects }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed projects
        id: set-projects
        run: |
          # Get list of changed files in the last commit
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          
          # Identify directories in app/ and infrastructure/ that have a Makefile
          PROJECTS=$(echo "$CHANGED_FILES" | grep -E '^(app/|infrastructure/)' | cut -d/ -f1,2 | sort -u)
          
          # Filter for directories that actually have a Makefile
          VALID_PROJECTS=()
          for project in $PROJECTS; do
            if [ -f "$project/Makefile" ]; then
              VALID_PROJECTS+=("\"$project\"")
            fi
          done
          
          # Join into a JSON array for matrix
          JSON_PROJECTS="[$(IFS=,; echo "${VALID_PROJECTS[*]}")]"
          echo "projects=$JSON_PROJECTS" >> $GITHUB_OUTPUT
          echo "Detected projects: $JSON_PROJECTS"

  apply-dev:
    name: Apply Dev / ${{ matrix.project }}
    needs: detect-changes
    if: needs.detect-changes.outputs.projects != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.projects) }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Google Credentials
        if: startsWith(matrix.project, 'infrastructure/gcp') || matrix.project == 'app/cognito'
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/google-credentials.json

      - uses: opentofu/setup-opentofu@v1

      - name: Deploy to Dev
        working-directory: ${{ matrix.project }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/google-credentials.json
          GITHUB_TOKEN: ${{ secrets.GH_TOFU_TOKEN }}
          ENV: dev
        run: |
          make build
          make deploy

  apply-prod:
    name: Apply Prod / ${{ matrix.project }}
    needs: detect-changes
    if: needs.detect-changes.outputs.projects != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.projects) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Pin Change
        id: pin-check
        working-directory: ${{ matrix.project }}
        run: |
          if [ -f "infrastructure/prod/pin" ]; then
            if git diff --name-only HEAD~1 HEAD | grep -q "${{ matrix.project }}/infrastructure/prod/pin"; then
              echo "PIN_CHANGED=true" >> $GITHUB_ENV
              PIN_SHA=$(cat infrastructure/prod/pin)
              echo "PIN_SHA=$PIN_SHA" >> $GITHUB_ENV
              echo "Pin changed to $PIN_SHA"
            fi
          fi

      - name: Checkout Pinned Version
        if: env.PIN_CHANGED == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PIN_SHA }}

      - name: Configure AWS credentials
        if: env.PIN_CHANGED == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Google Credentials
        if: env.PIN_CHANGED == 'true' && (startsWith(matrix.project, 'infrastructure/gcp') || matrix.project == 'app/cognito')
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/google-credentials.json

      - uses: opentofu/setup-opentofu@v1
        if: env.PIN_CHANGED == 'true'

      - name: Deploy to Prod
        if: env.PIN_CHANGED == 'true'
        working-directory: ${{ matrix.project }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/google-credentials.json
          GITHUB_TOKEN: ${{ secrets.GH_TOFU_TOKEN }}
          ENV: prod
        run: |
          make build
          make deploy
